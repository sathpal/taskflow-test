version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
  auth-service:
    build: ./authentication-service
    ports:
      - '3001:3001'
  task-service:
    build: ./task-service
    ports:
      - '3002:3002'
  assignment-service:
    build: ./assignment-service
    ports:
      - '3003:3003'
  reminder-service:
    build: ./reminder-service
    ports:
      - '3004:3004'
  dashboard-service:
    build: ./dashboard-service
    ports:
      - '3005:3005'
  mongo:
    image: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
